<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Propose Club Destination - ADVENTURE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <style>
        /* Custom Premium Add Listing Form Card Styling */
        .add-listing-section {
            padding: 120px 0 80px 0;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-listing-container {
            width: 90%;
            max-width: 760px;
            margin: 0 auto;
        }

        /* Glassmorphic Card Panel */
        .add-listing-card {
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
            transition: all 0.3s ease;
        }

        body.dark .add-listing-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
        }

        .add-listing-card:hover {
            border-color: rgba(252, 3, 107, 0.25);
            box-shadow: 0 30px 60px rgba(252, 3, 107, 0.08);
        }

        /* Card Header Logo & Badges */
        .add-card-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .add-card-icon {
            width: 60px;
            height: 60px;
            background: rgba(252, 3, 107, 0.1);
            border: 1px solid rgba(252, 3, 107, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            color: #fc036b;
            font-size: 1.6rem;
            box-shadow: 0 0 15px rgba(252, 3, 107, 0.2);
            animation: float-gently 3s ease-in-out infinite;
        }

        @keyframes float-gently {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-5px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .add-card-header h2 {
            font-family: var(--ff-montserrat);
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff2a81, #fc036b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .add-card-header p {
            color: #a9a9b8;
            font-family: var(--ff-roboto);
            font-size: 0.95rem;
            max-width: 480px;
            margin: 0 auto;
        }

        body.dark .add-card-header p {
            color: #555;
        }

        .card-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin-bottom: 30px;
        }

        body.dark .card-separator {
            background: rgba(0, 0, 0, 0.08);
        }

        /* Form Fields & High-Fidelity Icon Inputs */
        .premium-form {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .form-row-split {
            display: grid;
            grid-template-columns: 1fr;
            /* single full-width stack */
            gap: 22px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-group label {
            font-family: var(--ff-montserrat);
            font-size: 0.78rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.8px;
            color: #a9a9b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        body.dark .field-group label {
            color: #444;
        }

        .field-group label i {
            color: #fc036b;
        }

        /* Absolute Input Icon integration */
        .input-icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon-wrapper input,
        .input-icon-wrapper textarea {
            width: 100%;
            padding: 14px 16px 14px 44px;
            /* leaves room for absolute icon */
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            font-family: var(--ff-roboto);
            font-size: 0.98rem;
            outline: none;
            transition: all 0.3s ease;
        }

        body.dark .input-icon-wrapper input,
        body.dark .input-icon-wrapper textarea {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.12);
            color: #111;
        }

        .input-icon-wrapper textarea {
            padding: 14px 16px 14px 44px;
            height: 130px;
            resize: none;
        }

        .input-icon-wrapper input:focus,
        .input-icon-wrapper textarea:focus {
            border-color: #fc036b;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(252, 3, 107, 0.15);
        }

        body.dark .input-icon-wrapper input:focus,
        body.dark .input-icon-wrapper textarea:focus {
            background: rgba(0, 0, 0, 0.04);
        }

        .input-vector-icon {
            position: absolute;
            left: 16px;
            color: #a9a9b8;
            font-size: 1.05rem;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* Shift vector icon on input focus */
        .input-icon-wrapper input:focus~.input-vector-icon,
        .input-icon-wrapper textarea:focus~.input-vector-icon {
            color: #fc036b;
        }

        /* Custom textare position adjustment */
        .textarea-align-icon {
            top: 17px;
        }

        /* Glossy Submission Button */
        .add-submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff2a81, #fc036b);
            border: none;
            border-radius: 12px;
            color: #ffffff !important;
            font-family: var(--ff-montserrat);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(252, 3, 107, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .add-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(252, 3, 107, 0.45);
        }

        .add-submit-btn:active {
            transform: translateY(0px);
        }

        /* Dynamic Feedback Text */
        .feedback-message {
            margin-top: 15px;
            text-align: center;
            font-family: var(--ff-montserrat);
            font-weight: 700;
            font-size: 0.95rem;
            min-height: 20px;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>
    <!-- Background Ambient Blobs for Premium Aesthetic -->
    <div class="bg-blobs">
        <div class="blob blob-pink"></div>
        <div class="blob blob-blue"></div>
    </div>

    <!-- navbar -->
    <nav class="navbar glass" style="height: 70px">
        <span>
            <a href="index.html" style="display: flex; align-items: center">
                <img class="img2" src="./img/mountain.png" width="40" style="margin: -25px -10px -25px -20px" />
                <h1 class="logo">&nbsp;ADVENTURE</h1>
            </a>
        </span>
        <ul class="nav-links">
            <li><a href="index.html#home" id="pri" class="cir_border">Home</a></li>
            <li><a href="tours.html" id="quad" class="cir_border">Tours & Events</a></li>
            <li><a href="index.html#about" id="quint" class="cir_border">About</a></li>
            <li><a href="contact.html" id="hept" class="cir_border">Contact</a></li>
            <li><a href="add.html" class="active cir_border">Add Listing</a></li>
            <li><a href="listings.html" class="cir_border">Listings</a></li>
            <li><a href="ai.html" class="cir_border">AI Assistant</a></li>
            <li>
                <div>
                    <input type="checkbox" class="checkbox dark" id="checkbox" />
                    <label for="checkbox" class="label">
                        <i class="fa fa-moon-o"></i>
                        <i class="fa fa-sun-o"></i>
                        <div class="ball"></div>
                    </label>
                </div>
            </li>
        </ul>
        <img src="./img/menu-btn.png" alt="" class="menu-btn" />
    </nav>

    <!-- Main Form Section -->
    <main class="add-listing-section">
        <div class="add-listing-container">

            <div class="add-listing-card">

                <div class="add-card-header">
                    <div class="add-card-icon"><i class="fa fa-map-pin"></i></div>
                    <h2>Propose Destination</h2>
                    <p>Share local road trips, weekend treks, or custom schedules with fellow members of our travel
                        club.</p>
                </div>

                <div class="card-separator"></div>

                <form id="addForm" class="premium-form" autocomplete="off">

                    <div class="form-row-split">
                        <!-- Name Input Field -->
                        <div class="field-group">
                            <label for="name"><i class="fa fa-user"></i> Proposer Name</label>
                            <div class="input-icon-wrapper">
                                <input type="text" id="name" placeholder="Enter your name here" required />
                                <i class="fa fa-user input-vector-icon"></i>
                            </div>
                        </div>

                        <!-- Email Input Field -->
                        <div class="field-group">
                            <label for="email"><i class="fa fa-envelope"></i> Billing Email</label>
                            <div class="input-icon-wrapper">
                                <input type="email" id="email" placeholder="user@example.com" required />
                                <i class="fa fa-envelope input-vector-icon"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Title Input Field -->
                    <div class="field-group">
                        <label for="title"><i class="fa fa-map-marker"></i> Destination / Tour Title</label>
                        <div class="input-icon-wrapper">
                            <input type="text" id="title" placeholder="Enter Destination Name " required />
                            <i class="fa fa-map-marker input-vector-icon"></i>
                        </div>
                    </div>

                    <!-- Description Textarea Field -->
                    <div class="field-group">
                        <label for="description"><i class="fa fa-align-left"></i> Proposal Description Details</label>
                        <div class="input-icon-wrapper">
                            <textarea id="description"
                                placeholder="Provide a beautiful description detailing itinerary paths, travel seasons, and expected ticket prices..."
                                required></textarea>
                            <i class="fa fa-align-left input-vector-icon textarea-align-icon"></i>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="add-submit-btn">
                        <span>Propose Club Destination</span>
                        <i class="fa fa-arrow-right"></i>
                    </button>

                    <!-- Feedback Message block -->
                    <div id="msg" class="feedback-message"></div>

                </form>
            </div>

        </div>
    </main>

    <!-- footer -->
    <section class="footer">
        <span>Created By Ankush | &#169; 2026 All rights reserved.</span>
        <div class="social">
            <li></li>
        </div>
    </section>

    <!-- navbar toggler & theme coordinator script -->
    <script>
        // Mobile Menu Toggle logic
        const menuBtn = document.querySelector(".menu-btn");
        const navlinks = document.querySelector(".nav-links");

        menuBtn.addEventListener("click", () => {
            navlinks.classList.toggle("mobile-menu");
        });

        // Dark/Light Theme Sync logic
        const checkbox = document.getElementById("checkbox");

        function checkDarkMode() {
            if (
                localStorage.getItem("tourism_website_darkmode") !== null &&
                localStorage.getItem("tourism_website_darkmode") === "true"
            ) {
                document.body.classList.add("dark");
                checkbox.checked = true;
            }
        }
        checkDarkMode();

        checkbox.addEventListener("change", () => {
            document.body.classList.toggle("dark");
            document.body.classList.contains("dark")
                ? localStorage.setItem("tourism_website_darkmode", true)
                : localStorage.setItem("tourism_website_darkmode", false);
        });
    </script>
    <script src="js/add.js"></script>
</body>

</html>
